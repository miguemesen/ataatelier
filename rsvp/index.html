<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invitación</title>
<style>
  :root {
    --turquoise: #6fd6cc;
    --turquoise-dark: #4fc0b5;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  /* ---------- LOADING SCREEN ---------- */
  #loading-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background-color: #eaf6f4;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease;
  }

  #loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-dots {
    display: flex;
    gap: 10px;
  }

  .loading-dots span {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--turquoise);
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ---------- MAIN CONTENT ---------- */
  #main-content {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 6vw 6vw 10vw;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #main-content.visible {
    opacity: 1;
  }

  .invitation-card {
    width: 100%;
    max-width: 480px;
    margin-top: 4vh;
  }

  .invitation-card img {
    width: 100%;
    display: block;
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  .buttons {
    width: 100%;
    max-width: 480px;
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .btn {
    display: block;
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.5px;
    padding: 16px 20px;
    border-radius: 999px;
    background-color: #ffffff;
    color: var(--turquoise-dark);
    border: 2px solid var(--turquoise);
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transition: background-color 0.15s ease, color 0.15s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active,
  .btn.pressed {
    background-color: var(--turquoise);
    color: #ffffff;
    transform: scale(0.97);
  }

  /* ---------- ERROR STATE ---------- */
  #error-screen {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10vw;
    background: #eaf6f4;
    color: #2c5f5a;
  }

  #error-screen.visible { display: flex; }

  @media (min-width: 600px) {
    #main-content { padding-top: 4vh; }
  }
</style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ERROR SCREEN (shown if ?e= is missing or invalid) -->
  <div id="error-screen">
    <p>No pudimos encontrar esta invitación. Verifica el enlace e intenta de nuevo.</p>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content">
    <div class="invitation-card">
      <img id="invitation-img" src="" alt="Invitación">
    </div>

    <div class="buttons">
      <a class="btn" id="btn-confirmar" href="#" target="_blank" rel="noopener noreferrer">
        CONFIRMAR ASISTENCIA
      </a>

      <a class="btn" id="btn-ubicacion" href="#" target="_blank" rel="noopener noreferrer">
        VER UBICACIÓN
      </a>
    </div>
  </div>

  <script>
    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const eventSlug = params.get('e');

      const loadingScreen = document.getElementById('loading-screen');
      const errorScreen = document.getElementById('error-screen');
      const mainContent = document.getElementById('main-content');

      function showError() {
        loadingScreen.classList.add('hidden');
        errorScreen.classList.add('visible');
      }

      if (!eventSlug) {
        showError();
        return;
      }

      const basePath = `/events/${eventSlug}/`;

      let config;
      try {
        const res = await fetch(basePath + 'config.json');
        if (!res.ok) throw new Error('Config not found');
        config = await res.json();
      } catch (err) {
        showError();
        return;
      }

      // Apply page title
      if (config.pageTitle) {
        document.title = config.pageTitle;
      }

      // Apply links
      document.getElementById('btn-confirmar').href = config.confirmarLink || '#';
      document.getElementById('btn-ubicacion').href = config.ubicacionLink || '#';

      // Apply images
      const bgUrl = basePath + config.background;
      const loadingUrl = basePath + config.loadingScreen;
      const invitationUrl = basePath + config.invitationImage;

      document.getElementById('invitation-img').src = invitationUrl;
      loadingScreen.style.backgroundImage = `url('${loadingUrl}')`;
      mainContent.style.backgroundImage = `url('${bgUrl}')`;

      // Preload background + invitation image, then reveal content
      const imagesToPreload = [bgUrl, invitationUrl];
      let loadedCount = 0;

      function showContent() {
        loadingScreen.classList.add('hidden');
        mainContent.classList.add('visible');
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 650);
      }

      function onImageDone() {
        loadedCount++;
        if (loadedCount >= imagesToPreload.length) {
          setTimeout(showContent, 400);
        }
      }

      imagesToPreload.forEach((src) => {
        const img = new Image();
        img.onload = onImageDone;
        img.onerror = onImageDone;
        img.src = src;
      });

      // Safety fallback
      setTimeout(showContent, 4000);
    })();
  </script>

</body>
</html>
